<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel '92 - AI Card Scanner Portal</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0A0A0D;
            font-family: 'Inter', sans-serif;
        }
        .hud-scan-box {
            box-shadow: 0 0 0 9999px rgba(10, 10, 13, 0.7);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>
<body class="text-gray-100 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="border-b border-gray-900 bg-gray-950/80 backdrop-blur px-4 py-3 shrink-0 flex items-center justify-between">
        <div>
            <span class="text-[9px] uppercase tracking-[0.25em] text-cyan-400 font-bold block">Mobile Companion</span>
            <h1 class="text-lg font-display font-bold text-white tracking-wider">MARVEL '92 AI SCANNER</h1>
        </div>
        <button onclick="toggleConfig()" class="text-xs px-3 py-1.5 bg-gray-900 border border-gray-800 rounded-lg hover:bg-gray-800 transition">
            ⚙️ Setup API
        </button>
    </header>

    <!-- Configuration Overlay Box -->
    <section id="config-panel" class="hidden shrink-0 bg-gray-950 p-4 border-b border-cyan-950/40">
        <div class="max-w-md mx-auto space-y-3">
            <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Connect Your System API</h3>
            
            <div>
                <label class="block text-[10px] text-gray-400 mb-1">Google Sheets Web App Deployment URL</label>
                <input type="text" id="sheets-url" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-cyan-400">
            </div>

            <div>
                <label class="block text-[10px] text-gray-400 mb-1">Gemini API Key (Leave blank if saved in sheet parameters)</label>
                <input type="password" id="gemini-key" placeholder="Enter your Google AI Studio API Key..." class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-cyan-400">
            </div>
            
            <div class="flex gap-2">
                <button onclick="saveConfiguration()" class="grow py-1.5 bg-cyan-400 text-black font-bold rounded-lg text-xs hover:bg-cyan-300">
                    Save Config
                </button>
                <button onclick="toggleConfig()" class="px-3 py-1.5 bg-gray-900 text-gray-400 rounded-lg text-xs">
                    Cancel
                </button>
            </div>
        </div>
    </section>

    <!-- Camera stream viewing block -->
    <main class="grow relative flex flex-col justify-between overflow-hidden">
        
        <!-- Live Video Element -->
        <video id="webcam-preview" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover z-0"></video>
        
        <!-- Photographic Canvas (Invisible, used to capture base64 chunks) -->
        <canvas id="photo-canvas" class="hidden"></canvas>

        <!-- Graphic HUD overlay frame -->
        <div class="absolute inset-0 z-10 pointer-events-none flex items-center justify-center">
            <div class="w-72 h-96 border-2 border-cyan-400 rounded-xl relative hud-scan-box flex flex-col justify-between p-4">
                <!-- Glowing corner accents -->
                <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-cyan-400 rounded-tl-lg neon-border"></div>
                <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-cyan-400 rounded-tr-lg neon-border"></div>
                <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-cyan-400 rounded-bl-lg neon-border"></div>
                <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-cyan-400 rounded-br-lg neon-border"></div>
                
                <!-- Helper instructions inside target locator -->
                <div class="text-[10px] bg-black/70 border border-cyan-900/60 rounded p-1.5 text-center text-cyan-400 w-full select-none backdrop-blur-xs">
                    POSITION CARD HERE
                </div>
                
                <div class="text-[9px] text-gray-400 bg-black/60 p-1 text-center rounded select-none">
                    Ensure camera zoom captures card text clearly.
                </div>
            </div>
        </div>

        <!-- Floating analysis toast window -->
        <div id="status-indicator" class="absolute top-4 left-4 right-4 z-20 hidden">
            <div class="bg-gray-950/90 border border-cyan-950 border-cyan-400/20 backdrop-blur p-3 rounded-xl flex items-center gap-3">
                <span class="w-3.5 h-3.5 rounded-full bg-cyan-400 animate-ping"></span>
                <div class="grow">
                    <h4 id="status-headline" class="text-xs font-bold text-white uppercase tracking-wider">Analyzing Card...</h4>
                    <p id="status-details" class="text-[10px] text-gray-400">Passing frame data to Gemini Multimodal engine.</p>
                </div>
            </div>
        </div>

        <!-- Bottom Controller Panel -->
        <section class="relative z-20 w-full mt-auto bg-gradient-to-t from-black via-black/85 to-transparent px-6 pb-8 pt-10 flex flex-col items-center gap-4">
            
            <!-- Real-Time AI scan trigger button -->
            <button onclick="captureAndScanCard()" class="w-16 h-16 rounded-full bg-white border-4 border-cyan-400 hover:bg-cyan-200 active:scale-95 transition flex items-center justify-center shadow-lg">
                <div class="w-10 h-10 rounded-full bg-cyan-400"></div>
            </button>
            <span class="text-xs text-cyan-400 font-semibold uppercase tracking-widest select-none">Snap AI Scan</span>

            <!-- Last Scanned Card Info Panel -->
            <div id="scan-history" class="hidden w-full max-w-sm bg-gray-950/95 border border-cyan-950 rounded-xl p-3 flex gap-3 backdrop-blur shadow-2xl">
                <div class="w-12 h-12 rounded-lg bg-cyan-950/50 border border-cyan-900/40 flex items-center justify-center font-display font-bold text-lg text-cyan-400" id="hist-num">
                    #46
                </div>
                <div class="grow flex flex-col justify-center">
                    <h4 class="text-xs font-bold text-white" id="hist-name">Jean Grey</h4>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="text-[9px] font-bold text-cyan-400 uppercase tracking-wider px-1.5 py-0.5 bg-cyan-950/40 rounded border border-cyan-900" id="hist-parallel">PMG Blue</span>
                        <span class="text-[9px] font-mono text-gray-400" id="hist-serial">Sn: 12/50</span>
                    </div>
                </div>
                <div class="text-[10px] text-green-400 font-bold self-center flex items-center gap-1 shrink-0">
                    ✅ Vaulted
                </div>
            </div>
        </section>
    </main>

    <script>
        let stream = null;

        // Configuration variables saved locally in browser cache
        let config = {
            sheetsUrl: "",
            geminiKey: ""
        };

        window.onload = function() {
            loadConfig();
            initWebcam();
        };

        function loadConfig() {
            const saved = localStorage.getItem('marvel_scanner_config');
            if (saved) {
                config = JSON.parse(saved);
                document.getElementById('sheets-url').value = config.sheetsUrl || "";
                document.getElementById('gemini-key').value = config.geminiKey || "";
            } else {
                toggleConfig(); // Force show configuration if not set up
            }
        }

        function toggleConfig() {
            const panel = document.getElementById('config-panel');
            panel.classList.toggle('hidden');
        }

        function saveConfiguration() {
            config.sheetsUrl = document.getElementById('sheets-url').value.trim();
            config.geminiKey = document.getElementById('gemini-key').value.trim();
            
            localStorage.setItem('marvel_scanner_config', JSON.stringify(config));
            toggleConfig();
            alert("App parameters updated successfully!");
        }

        // Initialize user device back-camera video stream
        async function initWebcam() {
            const video = document.getElementById('webcam-preview');
            
            const constraints = {
                video: {
                    facingMode: { exact: "environment" }, // Standard physical back-camera
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                console.warn("Back camera facingMode failed. Attempting generic video setup:", err);
                // Fallback parameter set if exact back camera throws an environment error (like inside emulator)
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = stream;
                } catch (e) {
                    alert("Camera Stream Error: Ensure HTTPS or check device camera permissions.");
                }
            }
        }

        // Process picture framing, base64 compilation, and API network POST
        async function captureAndScanCard() {
            if (!config.sheetsUrl) {
                alert("Setup Required: Please configure your Google Sheets Web App Deployment URL in the ⚙️ settings panel first.");
                toggleConfig();
                return;
            }

            const video = document.getElementById('webcam-preview');
            const canvas = document.getElementById('photo-canvas');
            const ctx = canvas.getContext('2d');
            
            const statusDiv = document.getElementById('status-indicator');
            const headline = document.getElementById('status-headline');
            const details = document.getElementById('status-details');

            // Draw current video stream frame onto canvas object
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Export frame into JPEG data base64 stream string
            const base64Data = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

            // Render Loader UI
            statusDiv.classList.remove('hidden');
            headline.textContent = "AI Analysis Processing...";
            details.textContent = "Passing frame stream to Gemini Vision AI...";

            try {
                const response = await fetch(config.sheetsUrl, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'text/plain' // Helps avoid preflight issues inside Sheets API environment
                    },
                    body: JSON.stringify({
                        image: base64Data,
                        apiKey: config.geminiKey
                    })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || "System failed committing card properties.");
                }

                // Render successful scanner update UI
                headline.textContent = "Analysis Succeeded!";
                details.textContent = result.database || "Database checked successfully!";
                
                // Show History Box details
                document.getElementById('hist-num').textContent = `#${result.card.cardNumber}`;
                document.getElementById('hist-name').textContent = result.card.character;
                document.getElementById('hist-parallel').textContent = result.card.parallel;
                document.getElementById('hist-serial').textContent = `Sn: ${result.card.serial}`;
                
                document.getElementById('scan-history').classList.remove('hidden');

                // Auto clear scan toast banner after 4 seconds
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                }, 4000);

            } catch (err) {
                headline.textContent = "Scanning Failure";
                details.textContent = err.message;
                console.error(err);
                
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                }, 6000);
            }
        }
    </script>
</body>
</html>
